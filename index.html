<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<meta name="application-name" content="Trening">
<meta name="apple-mobile-web-app-title" content="Trening">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Trening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #10101a;
    --surface2: #18182a;
    --border: #25253a;
    --accent-a: #8b6cc4;
    --accent-a-dark: #5c3d9e;
    --accent-b: #3d8f62;
    --accent-b-dark: #235c3e;
    --text: #efefef;
    --text-muted: #6b6b8a;
    --text-dim: #9090b0;
    --success: #4ade80;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 15px;
  }

  .view { display: none; min-height: 100vh; flex-direction: column; }
  .view.active { display: flex; }

  /* ── STARFIELD ── */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HOME ── */
  #view-home {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 1.8rem;
    position: relative;
    overflow: hidden;
  }
  #view-home > * { z-index: 1; }

  /* ── LOGO ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .logo-img {
    width: 240px;
    filter: drop-shadow(0 0 18px rgba(140, 108, 200, 0.3));

  }
  .logo-tagline {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── DAY BUTTONS ── */
  .day-buttons {
    display: flex; flex-direction: column; gap: 1rem;
    width: 100%; max-width: 340px;
  }
  .btn-day {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.4rem 1.6rem; border: none; border-radius: 14px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative; overflow: hidden;
  }
  .btn-day::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-day:active { transform: scale(0.97); }

  .btn-day-a {
    background: linear-gradient(135deg, #6b4fa8, #4a2d7a);
    color: #e8d8ff;
    box-shadow: 0 4px 24px rgba(107, 79, 168, 0.35), 0 0 0 1px rgba(140,108,200,0.2);
  }
  .btn-day-a:active { box-shadow: 0 2px 12px rgba(107, 79, 168, 0.5); }

  .btn-day-b {
    background: linear-gradient(135deg, #2e7a52, #1a5236);
    color: #c8f0da;
    box-shadow: 0 4px 24px rgba(46, 122, 82, 0.35), 0 0 0 1px rgba(61,143,98,0.2);
  }
  .btn-day-b:active { box-shadow: 0 2px 12px rgba(46, 122, 82, 0.5); }

  .btn-day-label { font-size: 0.72rem; font-family: 'Inter', sans-serif; font-weight: 400; opacity: 0.7; letter-spacing: 0.12em; }
  .btn-day-inner { display: flex; flex-direction: column; align-items: flex-start; gap: 0.1rem; }
  .btn-day-arrow { font-size: 1.6rem; opacity: 0.6; }

  /* ── STREAK ── */
  .streak-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.5rem 1.2rem;
    font-size: 0.8rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .streak-num { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--success); }

  /* ── BOTTOM BUTTONS ── */
  .btn-history {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 0.75rem 1.6rem; border-radius: 8px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.82rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
    width: 100%; max-width: 340px;
  }
  .btn-history:active { color: var(--text); border-color: var(--text-muted); }

  .backup-bar {
    display: flex; gap: 0.6rem;
    width: 100%; max-width: 340px;
  }
  .btn-backup {
    flex: 1; background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 0.65rem 0.5rem; border-radius: 8px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s; text-align: center; display: block;
  }
  .btn-backup:active { color: var(--text); border-color: var(--text-muted); }

  /* ── DAY VIEW ── */
  #view-day { flex-direction: column; background: var(--bg); }

  .day-header {
    padding: 1rem 1.2rem 0.8rem;
    display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(8,8,16,0.95);
    backdrop-filter: blur(8px); z-index: 10;
  }
  .back-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 1.4rem; cursor: pointer; padding: 0.2rem 0.4rem; line-height: 1;
  }
  .day-header-title {
    font-family: 'Rajdhani', sans-serif; font-size: 1.4rem;
    font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .day-header-title span { opacity: 0.45; font-size: 0.95rem; margin-left: 0.4rem; font-family: 'Inter', sans-serif; font-weight: 300; }
  .day-header-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
  .dot-a { background: var(--accent-a); box-shadow: 0 0 8px var(--accent-a); }
  .dot-b { background: var(--accent-b); box-shadow: 0 0 8px var(--accent-b); }

  /* autosave indicator */
  .autosave-indicator {
    font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.08em;
    opacity: 0; transition: opacity 0.4s;
    margin-left: auto; white-space: nowrap;
  }
  .autosave-indicator.visible { opacity: 1; }

  .exercises-list {
    flex: 1; overflow-y: auto;
    padding: 1rem 1rem 6rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .exercise-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  .exercise-name {
    padding: 0.8rem 1rem 0.5rem; font-size: 0.73rem;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .exercise-num { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; }
  .sets-table { padding: 0 0.8rem 0.4rem; }
  .sets-header {
    display: grid; grid-template-columns: 2rem 1fr 1fr auto;
    gap: 0.4rem; padding: 0 0.2rem 0.3rem;
    font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted);
  }
  .set-row {
    display: grid; grid-template-columns: 2rem 1fr 1fr auto;
    gap: 0.4rem; align-items: center; margin-bottom: 0.4rem;
  }
  .set-num { font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); text-align: center; }
  .set-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 600;
    text-align: center; padding: 0.5rem 0.3rem; width: 100%;
    -moz-appearance: textfield;
  }
  .set-input:focus { outline: none; }
  .set-input.focus-a:focus { border-color: var(--accent-a); }
  .set-input.focus-b:focus { border-color: var(--accent-b); }
  .set-input::-webkit-outer-spin-button,
  .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .remove-set-btn {
    background: none; border: none; color: var(--border);
    font-size: 1.1rem; cursor: pointer; padding: 0.3rem; line-height: 1; transition: color 0.15s;
  }
  .remove-set-btn:active { color: var(--danger); }
  .add-set-btn {
    width: 100%; background: none; border: 1px dashed var(--border); border-radius: 6px;
    color: var(--text-muted); font-size: 0.73rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.5rem; cursor: pointer; margin: 0.2rem 0 0.8rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-set-btn:active { border-color: var(--text-muted); color: var(--text); }

  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 0.8rem 1rem;
    background: linear-gradient(to top, var(--bg) 55%, transparent);
    display: flex; gap: 0.8rem;
  }
  .save-btn {
    flex: 1; padding: 1rem; border: none; border-radius: 10px;
    font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .save-btn:active { opacity: 0.85; transform: scale(0.98); }
  .save-btn-a { background: linear-gradient(135deg, #6b4fa8, #4a2d7a); color: #e8d8ff; }
  .save-btn-b { background: linear-gradient(135deg, #2e7a52, #1a5236); color: #c8f0da; }

  /* ── HISTORY ── */
  #view-history { flex-direction: column; background: var(--bg); }
  .hist-header {
    padding: 1rem 1.2rem; display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid var(--border); background: rgba(8,8,16,0.95);
  }
  .hist-title { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .hist-body { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .hist-empty { text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-size: 0.9rem; letter-spacing: 0.05em; }
  .hist-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .hist-entry-header { padding: 0.7rem 1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .hist-entry-title { display: flex; align-items: center; gap: 0.6rem; }
  .hist-day-badge { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 0.15rem 0.6rem; border-radius: 4px; }
  .badge-a { background: rgba(107,79,168,0.2); color: var(--accent-a); }
  .badge-b { background: rgba(46,122,82,0.2); color: var(--accent-b); }
  .hist-date { font-size: 0.78rem; color: var(--text-muted); }
  .hist-toggle { color: var(--text-muted); font-size: 0.8rem; }
  .hist-details { border-top: 1px solid var(--border); padding: 0.7rem 1rem; display: none; flex-direction: column; gap: 0.5rem; }
  .hist-details.open { display: flex; }
  .hist-exercise { font-size: 0.76rem; color: var(--text-dim); display: flex; justify-content: space-between; gap: 0.5rem; }
  .hist-exercise-sets { font-size: 0.74rem; color: var(--text-muted); font-family: 'Rajdhani', sans-serif; font-weight: 500; text-align: right; }


  /* ── TRASH BUTTON ── */
  .hist-delete-btn {
    align-self: flex-end;
    margin-top: 0.3rem;
    background: transparent;
    border: 1px solid #2a2a3a;
    color: #6b6b8a;
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .hist-delete-btn:active { border-color: #ef4444; color: #ef4444; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 5rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 0.6rem 1.4rem; border-radius: 20px;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em;
    color: #0a0a0a; opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── CALENDAR VIEW ── */
  #view-calendar { flex-direction: column; background: var(--bg); }

  .cal-header {
    padding: 1rem 1.2rem; display: flex; align-items: center; gap: 0.8rem;
    border-bottom: 1px solid var(--border); background: rgba(8,8,16,0.95);
    backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 10;
  }
  .cal-title { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

  .cal-body { flex: 1; overflow-y: auto; padding: 1rem 1rem 8rem; }

  .cal-month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .cal-month-label {
    font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text);
  }
  .cal-nav-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    width: 2.2rem; height: 2.2rem; border-radius: 8px; cursor: pointer;
    font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  .cal-nav-btn:active { border-color: var(--text-muted); color: var(--text); }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 3px; margin-bottom: 1.2rem;
  }
  .cal-dow {
    text-align: center; font-size: 0.62rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 0.3rem 0; font-family: 'Inter', sans-serif;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    position: relative; transition: opacity 0.1s;
    border: 1px solid transparent;
    user-select: none;
  }
  .cal-day.empty { cursor: default; }
  .cal-day.today { border-color: var(--text-muted); }
  .cal-day.workout-a { background: rgba(107,79,168,0.3); color: #c8b0ff; }
  .cal-day.workout-b { background: rgba(46,122,82,0.3); color: #a0e8bc; }
  .cal-day.workout-ab {
    background: linear-gradient(135deg, rgba(107,79,168,0.3) 50%, rgba(46,122,82,0.3) 50%);
    color: var(--text);
  }
  .cal-day.in-range { background: rgba(140,108,200,0.1); border-radius: 0; }
  .cal-day.range-start, .cal-day.range-end {
    background: rgba(107,79,168,0.55) !important; color: #fff !important;
    border-color: rgba(140,108,200,0.7) !important; border-radius: 8px !important;
  }
  .cal-day:not(.empty):active { opacity: 0.7; }

  .cal-dot {
    position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
  }
  .cal-dot-a { background: #8b6cc4; }
  .cal-dot-b { background: #3d8f62; }

  .cal-range-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.8rem 1rem;
    display: flex; flex-direction: column; gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .cal-range-hint {
    font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.06em; text-align: center;
  }
  .cal-range-info {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.82rem; color: var(--text-dim);
  }
  .cal-range-dates {
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text);
  }
  .cal-range-count { font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; color: var(--text-muted); }
  .btn-clear-range {
    background: none; border: none; color: var(--text-muted);
    font-size: 0.75rem; cursor: pointer; letter-spacing: 0.06em;
    text-decoration: underline; text-underline-offset: 2px; padding: 0;
  }

  .cal-export-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 0.8rem 1rem;
    background: linear-gradient(to top, var(--bg) 55%, transparent);
    display: flex; gap: 0.8rem;
  }
  .btn-export-txt {
    flex: 1; padding: 1rem; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #6b4fa8, #4a2d7a); color: #e8d8ff;
    font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-export-txt:active { opacity: 0.85; transform: scale(0.98); }
  .btn-export-txt:disabled { opacity: 0.35; }

  .cal-legend {
    display: flex; gap: 1rem; justify-content: center; margin-bottom: 1rem;
  }
  .cal-legend-item {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em;
  }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .leg-a { background: rgba(107,79,168,0.5); }
  .leg-b { background: rgba(46,122,82,0.5); }

  .btn-lista {
    margin-left: auto; padding: 0.4rem 0.9rem; font-size: 0.72rem;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 8px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; letter-spacing: 0.08em;
    text-transform: uppercase;
  }

</style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- HOME -->
<div id="view-home" class="view active">

<script>
// ── STARFIELD ──
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 5000); // density
    for (let i = 0; i < count; i++) {
      const size = Math.random();
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.3 + size * 1.4,
        brightness: 0.1 + Math.random() * 0.75,
        speed: 0.003 + Math.random() * 0.012,
        phase: Math.random() * Math.PI * 2,
        glow: Math.random() > 0.65,
      });
    }
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame += 0.012;
    stars.forEach(s => {
      const twinkle = s.brightness * (0.5 + 0.5 * Math.sin(frame * s.speed * 60 + s.phase));
      ctx.save();
      if (s.glow) {
        const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        grd.addColorStop(0, `rgba(200,185,255,${twinkle * 0.6})`);
        grd.addColorStop(1, 'rgba(200,185,255,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = s.glow ? '#d4c8ff' : '#a0a0c0';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  draw();
})();

// ── APP ──
const DAYS = {
  A: [
    'Suwnica (Leg Press)',
    'Uginanie nóg siedząc',
    'Ściąganie drążka do klatki',
    'Wyciskanie na klatkę – maszyna',
    'Prostowanie nóg siedząc',
    'Spacer farmera (hantle)',
  ],
  B: [
    'Suwnica (szersza pozycja)',
    'Step-up na box',
    'Wiosłowanie na wyciągu siedząc',
    'Wyciskanie nad głowę – maszyna',
    'Glute Bridge',
  ],
};

let currentDay = 'A';
let autosaveTimer = null;

// showView defined below with calendar support

function openDay(day) {
  currentDay = day;
  document.getElementById('day-header-text').innerHTML =
    `Dzień ${day} <span>${new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'short'})}</span>`;
  document.getElementById('day-header-dot').className = 'day-header-dot dot-' + day.toLowerCase();
  document.getElementById('save-btn').className = 'save-btn save-btn-' + day.toLowerCase();
  renderExercises(day);
  restoreDraft(day);
  showView('day');
}

function renderExercises(day) {
  const list = document.getElementById('exercises-list');
  list.innerHTML = '';
  DAYS[day].forEach((name, idx) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `
      <div class="exercise-name">
        <span class="exercise-num">${idx + 1}.</span>${name}
      </div>
      <div class="sets-table" id="sets-${idx}">
        <div class="sets-header">
          <span></span><span>Ciężar (kg)</span><span>Powtórzenia</span><span></span>
        </div>
      </div>
      <button class="add-set-btn" onclick="addSet(${idx})">+ Dodaj serię</button>
    `;
    list.appendChild(card);
    addSet(idx);
  });
}

function addSet(exerciseIdx, weight, reps) {
  const container = document.getElementById('sets-' + exerciseIdx);
  const existing = container.querySelectorAll('.set-row').length;
  const row = document.createElement('div');
  row.className = 'set-row';
  const focusClass = `focus-${currentDay.toLowerCase()}`;
  row.innerHTML = `
    <span class="set-num">${existing + 1}</span>
    <input class="set-input weight ${focusClass}" type="number" inputmode="decimal" placeholder="—" min="0" step="0.5" value="${weight || ''}">
    <input class="set-input reps ${focusClass}" type="number" inputmode="numeric" placeholder="—" min="0" value="${reps || ''}">
    <button class="remove-set-btn" onclick="removeSet(this, ${exerciseIdx})">✕</button>
  `;
  row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', scheduleDraftSave));
  container.appendChild(row);
}

function removeSet(btn, exerciseIdx) {
  const container = document.getElementById('sets-' + exerciseIdx);
  if (container.querySelectorAll('.set-row').length <= 1) return;
  btn.closest('.set-row').remove();
  container.querySelectorAll('.set-row').forEach((r, i) => r.querySelector('.set-num').textContent = i + 1);
  scheduleDraftSave();
}

// ── AUTOSAVE DRAFT ──
function scheduleDraftSave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(saveDraft, 600);
}

function collectCurrentData() {
  const exercises = [];
  DAYS[currentDay].forEach((name, idx) => {
    const container = document.getElementById('sets-' + idx);
    if (!container) return;
    const sets = [];
    container.querySelectorAll('.set-row').forEach(row => {
      sets.push({
        weight: row.querySelector('.weight').value,
        reps: row.querySelector('.reps').value,
      });
    });
    exercises.push({ name, sets });
  });
  return exercises;
}

function saveDraft() {
  const draft = { day: currentDay, date: new Date().toISOString(), exercises: collectCurrentData() };
  localStorage.setItem('trening_draft', JSON.stringify(draft));
  const ind = document.getElementById('autosave-indicator');
  ind.classList.add('visible');
  setTimeout(() => ind.classList.remove('visible'), 1800);
}

function restoreDraft(day) {
  try {
    const raw = localStorage.getItem('trening_draft');
    if (!raw) return;
    const draft = JSON.parse(raw);
    if (draft.day !== day) return;
    // check if draft is from today
    const draftDate = new Date(draft.date).toDateString();
    if (draftDate !== new Date().toDateString()) return;
    // restore data
    draft.exercises.forEach((ex, idx) => {
      const container = document.getElementById('sets-' + idx);
      if (!container) return;
      // remove default empty set
      container.querySelectorAll('.set-row').forEach(r => r.remove());
      ex.sets.forEach(s => addSet(idx, s.weight, s.reps));
      if (!ex.sets.length) addSet(idx);
    });
  } catch(e) {}
}

function clearDraft() {
  localStorage.removeItem('trening_draft');
}

// ── SAVE ──
function saveWorkout() {
  const exercises = collectCurrentData();
  let hasData = false;
  exercises.forEach(ex => ex.sets.forEach(s => { if (s.weight || s.reps) hasData = true; }));

  if (!hasData) { showToast('Wpisz najpierw dane 💪', '#7b5ea7'); return; }

  // mark sets with — where empty
  exercises.forEach(ex => ex.sets.forEach(s => {
    if (!s.weight) s.weight = '—';
    if (!s.reps) s.reps = '—';
  }));

  const entry = { day: currentDay, date: new Date().toISOString(), exercises };
  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  history.unshift(entry);
  localStorage.setItem('trening_history', JSON.stringify(history));
  clearDraft();
  updateStreak();
  showToast('✓ Zapisano!', '#3d8f62');
  setTimeout(() => showView('home'), 900);
}

// ── HISTORY ──
function renderHistory() {
  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  const body = document.getElementById('hist-body');
  if (!history.length) {
    body.innerHTML = '<div class="hist-empty">Brak zapisanych treningów.<br>Zacznij pierwszy! 💪</div>';
    return;
  }
  body.innerHTML = '';
  history.forEach((entry, i) => {
    const dateStr = new Date(entry.date).toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' });
    const el = document.createElement('div');
    el.className = 'hist-entry';
    const setsPreview = entry.exercises.map(e => {
      const filled = e.sets.filter(s => s.weight !== '—' || s.reps !== '—');
      if (!filled.length) return '';
      return `<div class="hist-exercise"><span>${e.name}</span><span class="hist-exercise-sets">${filled.map(s => `${s.weight}kg × ${s.reps}`).join(', ')}</span></div>`;
    }).filter(Boolean).join('');
    el.innerHTML = `
      <div class="hist-entry-header" onclick="toggleHist(this)">
        <div class="hist-entry-title">
          <span class="hist-day-badge badge-${entry.day.toLowerCase()}">Dzień ${entry.day}</span>
          <span class="hist-date">${dateStr}</span>
        </div>
        <span class="hist-toggle">▾</span>
      </div>
      <div class="hist-details">
        ${setsPreview || '<div class="hist-date">Brak danych</div>'}
        <button class="hist-delete-btn" onclick="deleteEntry(${i}, event)">🗑 usuń trening</button>
      </div>
    `;
    body.appendChild(el);
  });
}

function toggleHist(header) {
  const details = header.nextElementSibling;
  details.classList.toggle('open');
  header.querySelector('.hist-toggle').textContent = details.classList.contains('open') ? '▴' : '▾';
}


// ── CALENDAR ──
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let rangeStart = null;
let rangeEnd = null;

const PL_MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
                   'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const PL_DAYS_SHORT = ['Pn','Wt','Śr','Cz','Pt','Sb','Nd'];
const PL_DAYS_LONG = ['poniedziałek','wtorek','środa','czwartek','piątek','sobota','niedziela'];
const PL_MONTHS_GEN = ['stycznia','lutego','marca','kwietnia','maja','czerwca',
                       'lipca','sierpnia','września','października','listopada','grudnia'];

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'home') updateStreak();
  if (name === 'calendar') renderCalendar();
}

function getWorkoutMap() {
  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  const map = {};
  history.forEach(entry => {
    const d = new Date(entry.date);
    const key = d.toISOString().slice(0,10);
    if (!map[key]) map[key] = [];
    if (!map[key].includes(entry.day)) map[key].push(entry.day);
  });
  return map;
}

function calPrevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function calNextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = PL_MONTHS[calMonth] + ' ' + calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const wmap = getWorkoutMap();
  const today = new Date().toISOString().slice(0,10);

  // Day-of-week headers (Mon first)
  PL_DAYS_SHORT.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // First day of month (Mon=0)
  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon-first

  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    if (dateStr === today) el.classList.add('today');

    const workouts = wmap[dateStr] || [];
    if (workouts.includes('A') && workouts.includes('B')) {
      el.classList.add('workout-ab');
    } else if (workouts.includes('A')) {
      el.classList.add('workout-a');
      const dot = document.createElement('div');
      dot.className = 'cal-dot cal-dot-a';
      el.appendChild(dot);
    } else if (workouts.includes('B')) {
      el.classList.add('workout-b');
      const dot = document.createElement('div');
      dot.className = 'cal-dot cal-dot-b';
      el.appendChild(dot);
    }

    // Range highlighting
    if (rangeStart && rangeEnd) {
      const lo = rangeStart < rangeEnd ? rangeStart : rangeEnd;
      const hi = rangeStart < rangeEnd ? rangeEnd : rangeStart;
      if (dateStr > lo && dateStr < hi) el.classList.add('in-range');
      if (dateStr === lo) el.classList.add('range-start');
      if (dateStr === hi) el.classList.add('range-end');
    } else if (rangeStart && dateStr === rangeStart) {
      el.classList.add('range-start');
    }

    el.addEventListener('click', () => onDayClick(dateStr));
    grid.appendChild(el);
  }

  updateRangeBar();
}

function onDayClick(dateStr) {
  if (!rangeStart || (rangeStart && rangeEnd)) {
    rangeStart = dateStr;
    rangeEnd = null;
  } else {
    if (dateStr === rangeStart) {
      rangeStart = null;
    } else if (dateStr < rangeStart) {
      rangeEnd = rangeStart;
      rangeStart = dateStr;
    } else {
      rangeEnd = dateStr;
    }
  }
  renderCalendar();
}

function clearRange() {
  rangeStart = null;
  rangeEnd = null;
  renderCalendar();
}

function updateRangeBar() {
  const hint = document.getElementById('cal-range-hint');
  const info = document.getElementById('cal-range-info');
  const btn = document.getElementById('btn-export-txt');

  if (!rangeStart) {
    hint.style.display = '';
    hint.textContent = 'Kliknij dzień aby zacząć zaznaczać zakres';
    info.style.display = 'none';
    btn.disabled = true;
    return;
  }

  if (rangeStart && !rangeEnd) {
    hint.style.display = '';
    const d = new Date(rangeStart + 'T12:00:00');
    hint.textContent = `Zaznaczono: ${d.getDate()} ${PL_MONTHS_GEN[d.getMonth()]} — kliknij drugi dzień`;
    info.style.display = 'none';
    btn.disabled = true;
    return;
  }

  hint.style.display = 'none';
  info.style.display = '';

  const lo = rangeStart < rangeEnd ? rangeStart : rangeEnd;
  const hi = rangeStart < rangeEnd ? rangeEnd : rangeStart;
  const dLo = new Date(lo + 'T12:00:00');
  const dHi = new Date(hi + 'T12:00:00');

  document.getElementById('cal-range-dates').textContent =
    `${dLo.getDate()} ${PL_MONTHS_GEN[dLo.getMonth()]} – ${dHi.getDate()} ${PL_MONTHS_GEN[dHi.getMonth()]} ${dHi.getFullYear()}`;

  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  const inRange = history.filter(e => {
    const d = new Date(e.date).toISOString().slice(0,10);
    return d >= lo && d <= hi;
  });
  document.getElementById('cal-range-count').textContent =
    `${inRange.length} trening${inRange.length === 1 ? '' : inRange.length < 5 ? 'i' : 'ów'}`;

  btn.disabled = inRange.length === 0;
}

function exportTxt() {
  if (!rangeStart || !rangeEnd) return;
  const lo = rangeStart < rangeEnd ? rangeStart : rangeEnd;
  const hi = rangeStart < rangeEnd ? rangeEnd : rangeStart;

  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  const entries = history
    .filter(e => { const d = new Date(e.date).toISOString().slice(0,10); return d >= lo && d <= hi; })
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  if (!entries.length) return;

  const dLo = new Date(lo + 'T12:00:00');
  const dHi = new Date(hi + 'T12:00:00');
  const exportDate = new Date().toLocaleDateString('pl-PL', {day:'numeric', month:'long', year:'numeric'});

  let txt = '=== DZIENNIK TRENINGOWY ===\n';
  txt += `Okres: ${dLo.getDate()} ${PL_MONTHS_GEN[dLo.getMonth()]} – ${dHi.getDate()} ${PL_MONTHS_GEN[dHi.getMonth()]} ${dHi.getFullYear()}\n`;
  txt += `Eksport: ${exportDate}\n`;
  txt += `Łącznie treningów: ${entries.length}\n`;
  const cntA = entries.filter(e=>e.day==='A').length;
  const cntB = entries.filter(e=>e.day==='B').length;
  txt += `Dzień A: ${cntA}  |  Dzień B: ${cntB}\n`;
  txt += '\n' + '='.repeat(35) + '\n\n';

  entries.forEach(entry => {
    const d = new Date(entry.date);
    const dow = PL_DAYS_LONG[d.getDay() === 0 ? 6 : d.getDay()-1];
    const dateLabel = `${dow.charAt(0).toUpperCase()+dow.slice(1)}, ${d.getDate()} ${PL_MONTHS_GEN[d.getMonth()]} ${d.getFullYear()}`;
    txt += `--- ${dateLabel} | DZIEŃ ${entry.day} ---\n`;

    entry.exercises.forEach((ex, i) => {
      const filled = ex.sets.filter(s => s.weight !== '—' || s.reps !== '—');
      if (!filled.length) return;
      txt += `${i+1}. ${ex.name}\n`;
      filled.forEach((s, si) => {
        txt += `   Seria ${si+1}: ${s.weight}kg × ${s.reps} powt.\n`;
      });
    });
    txt += '\n';
  });

  txt += '='.repeat(35) + '\n';
  txt += 'Plik wygenerowany przez aplikację Trening (unsword.github.io/treningi)\n';

  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trening_${lo}_${hi}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📄 Pobrano!', '#6b4fa8');
}

// ── STREAK ──
function updateStreak() {
  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  if (!history.length) { document.getElementById('streak-num').textContent = '0'; return; }
  const dates = [...new Set(history.map(e => new Date(e.date).toDateString()))];
  let streak = 0;
  let check = new Date();
  for (let i = 0; i < 365; i++) {
    if (dates.includes(check.toDateString())) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else if (i === 0) {
      check.setDate(check.getDate() - 1);
      if (dates.includes(check.toDateString())) { streak++; check.setDate(check.getDate() - 1); }
      else break;
    } else break;
  }
  document.getElementById('streak-num').textContent = streak;
}

// ── BACKUP ──

function deleteEntry(idx, event) {
  event.stopPropagation();
  if (!confirm('Na pewno usunąć ten trening? Tej operacji nie można cofnąć.')) return;
  const history = JSON.parse(localStorage.getItem('trening_history') || '[]');
  history.splice(idx, 1);
  localStorage.setItem('trening_history', JSON.stringify(history));
  updateStreak();
  renderHistory();
  showToast('🗑 Usunięto', '#6b4fa8');
}

function exportJSON() {
  const history = localStorage.getItem('trening_history') || '[]';
  const blob = new Blob([history], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trening_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇ Pobrano backup!', '#4a7ab5');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      const existing = JSON.parse(localStorage.getItem('trening_history') || '[]');
      const merged = [...data, ...existing];
      const seen = new Set();
      const deduped = merged.filter(entry => {
        const key = entry.date + entry.day;
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
      deduped.sort((a, b) => new Date(b.date) - new Date(a.date));
      localStorage.setItem('trening_history', JSON.stringify(deduped));
      updateStreak();
      showToast('⬆ Zaimportowano!', '#3d8f62');
    } catch { showToast('Błąd pliku!', '#ef4444'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── TOAST ──
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#4ade80';
  t.style.color = '#fff';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── INIT ──
updateStreak();
</script>
